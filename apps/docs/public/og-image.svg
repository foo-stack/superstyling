  <!-- Pills -->
  <g font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="500">
    <g transform="translate(96, 510)">
      <rect width="190" height="46" rx="23" fill="rgba(49, 130, 206, 0.15)" stroke="rgba(49, 130, 206, 0.4)" stroke-width="1"/>
      <text x="95" y="30" text-anchor="middle" fill="#93c5fd">Cross-platform</text>
