<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#1A1A2E"/>
    </linearGradient>
    <radialGradient id="glowA" cx="240" cy="180" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3182CE" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3182CE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="980" cy="500" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#805AD5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#805AD5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
