nodeLinker: node-modules
enableGlobalCache: false

# Yarn v4 defaults publishes to registry.yarnpkg.com, but our NPM_TOKEN
# (and the .npmrc that changesets/action writes in CI) authenticate
# against registry.npmjs.org. Pin both so yarn npm publish uses the URL
# that matches the token — without this, publishes fail with
# "YN0033: No authentication configured for request".
npmRegistryServer: "https://registry.npmjs.org"
npmPublishRegistry: "https://registry.npmjs.org"
