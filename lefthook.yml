pre-commit:
  parallel: true
  skip:
    - run: "! git rev-parse --verify HEAD > /dev/null 2>&1"
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: yarn oxlint {staged_files}
    format:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,md,yml,yaml}"
      exclude:
        # Auto-generated by framework tooling; format churn on commit breaks the hook.
        - "**/routes.d.ts"
        - "**/*.generated.ts"
      run: yarn oxfmt --check {staged_files}
