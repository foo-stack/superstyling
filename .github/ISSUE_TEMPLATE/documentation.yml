name: Documentation
description: Report a docs issue — typo, missing info, unclear example, broken link
labels: ["docs", "needs-triage"]
body:
  - type: input
    id: page
    attributes:
      label: Page / file
      description: URL or file path of the problematic docs
      placeholder: "https://superstyling.dev/docs/... or docs/prior-art/README.md"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's wrong?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
    validations:
      required: false
