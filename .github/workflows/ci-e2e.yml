name: CI (slow lane — Maestro E2E)

on:
  # Manual trigger only. Running on every push / PR would require building
  # and installing the Expo playground app onto a sim/emulator first
  # (cocoapods + Xcode for iOS, Android SDK for Android — ~30 min per run
  # × 2 devices), which is overkill for an advisory workflow.
  #
  # Use `gh workflow run "CI (slow lane — Maestro E2E)"` to trigger when
  # needed, or use the "Run workflow" button in the Actions tab. Local-dev
  # testing against a device is the primary path — see docs/maestro-setup.md.
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# This workflow is advisory — failures here do not block PR merges.
# Critical regressions caught here should be addressed but won't gate the merge queue.

jobs:
  maestro-ios:
    name: Maestro — iOS Simulator
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: yarn install --immutable
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: List Maestro flows
        run: |
          if [ -d "apps/playground/.maestro" ]; then
            ls -la apps/playground/.maestro
          else
            echo "No Maestro flows yet — playground not built. Skipping iOS E2E."
            exit 0
          fi
      - name: Boot iOS Simulator
        run: xcrun simctl boot "iPhone 15" || true
      - name: Run Maestro flows
        if: hashFiles('apps/playground/.maestro/*.yaml') != ''
        working-directory: apps/playground
        run: maestro test .maestro
      - name: Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-artifacts
          path: |
            apps/playground/.maestro/.maestro
            ~/.maestro/tests
          retention-days: 7

  maestro-android:
    name: Maestro — Android Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - run: yarn install --immutable
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: List Maestro flows
        run: |
          if [ -d "apps/playground/.maestro" ]; then
            ls -la apps/playground/.maestro
          else
            echo "No Maestro flows yet — playground not built. Skipping Android E2E."
            exit 0
          fi
      - name: Run Maestro flows on Android emulator
        if: hashFiles('apps/playground/.maestro/*.yaml') != ''
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          script: |
            cd apps/playground
            maestro test .maestro
      - name: Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-artifacts
          path: |
            apps/playground/.maestro/.maestro
            ~/.maestro/tests
          retention-days: 7
