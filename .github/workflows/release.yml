name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
      - run: corepack enable
      - run: yarn install --immutable
      # Pre-build the publishable packages so tsc-emitted dist/ dirs exist
      # when changeset publish runs. Scoped to ./packages/* — `yarn build`
      # would also try to build apps/docs (One SSG, slow) and apps/todo-
      # example, which aren't published and can hang CI.
      - run: yarn build:packages
      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: yarn release
          version: yarn version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
